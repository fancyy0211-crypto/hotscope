name: Daily Digest

on:
  schedule:
    - cron: '0 1 * * *' # 每天 UTC 01:00（北京时间 09:00）
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Run daily digest script
        run: npx tsx scripts/sendDailyDigest.ts
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}

          DAILY_DIGEST_EMAILS: ${{ secrets.DAILY_DIGEST_EMAILS || vars.DAILY_DIGEST_EMAILS }}
          DAILY_DIGEST_PLATFORMS: ${{ secrets.DAILY_DIGEST_PLATFORMS || vars.DAILY_DIGEST_PLATFORMS }}
          DAILY_DIGEST_INDUSTRIES: ${{ secrets.DAILY_DIGEST_INDUSTRIES || vars.DAILY_DIGEST_INDUSTRIES }}
